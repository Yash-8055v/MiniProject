name: Keep Server Alive

# Pings the backend /health endpoint every 5 minutes so the free Render server
# never spins down, ensuring the trending news pipeline keeps running on schedule.

on:
  schedule:
    - cron: "*/5 * * * *"   # every 5 minutes, 24/7
  workflow_dispatch:          # also allows manual trigger from GitHub UI

jobs:
  ping:
    name: Ping Backend Health
    runs-on: ubuntu-latest
    timeout-minutes: 2

    steps:
      - name: Ping /health endpoint
        run: |
          echo "Pinging backend at $(date -u '+%Y-%m-%d %H:%M:%S UTC')"
          response=$(curl -s -o /tmp/health_response.json -w "%{http_code}" \
            --max-time 30 \
            https://truthcrew-api-miniproject.onrender.com/health)

          echo "HTTP Status: $response"
          echo "Response body:"
          cat /tmp/health_response.json

          if [ "$response" != "200" ]; then
            echo "❌ Health check failed with status $response"
            exit 1
          fi

          echo "✅ Server is alive"
